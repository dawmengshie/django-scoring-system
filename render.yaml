services:
  - type: web
    name: django-scoring-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn scoring_system.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    postDeployCommand: python manage.py migrate && python manage.py create_production_users
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scoring-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "django-scoring-system.onrender.com,localhost,127.0.0.1"

databases:
  - name: scoring-db
    databaseName: scoring_system
    user: scoring_user
