{% extends 'scores/base.html' %}

{% block title %}Dashboard - CRCCIMI FAMILY CAMP{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Welcome to CRCCIMI FAMILY CAMP</h1>
        <p class="mt-2 text-gray-600">Scoring System Dashboard</p>
    </div>
    
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-4">Simple Dashboard</h2>
        <p class="text-gray-600">You are successfully logged in!</p>
        <p class="text-gray-600">User: {{ user.username }}</p>
        
        <div class="mt-6">
            <a href="{% url 'logout' %}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
                Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
